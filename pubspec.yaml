version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.8.0
  flutter_dotenv: ^6.0.1
  cupertino_icons: ^1.0.8
